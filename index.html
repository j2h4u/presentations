<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Презентации</title>
<style>
  :root{
    --bg:#0E1116; --panel:#161B22; --panel2:#1B222C; --line:#232B36;
    --ink:#E6EDF3; --mut:#8B949E; --dim:#5b6675;
    --teal:#2DD4BF; --amber:#F5A623;
    --sans:-apple-system,"Segoe UI",system-ui,Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,"Liberation Mono",monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  .page{
    min-height:100vh; display:grid; grid-template-rows:auto minmax(0,1fr) auto;
    padding:clamp(20px,4.2vw,64px);
  }
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:16px}
  .crumbs{font-family:var(--mono); font-size:clamp(10px,1.35vw,15px); letter-spacing:.02em; color:var(--dim); display:flex; flex-wrap:wrap; gap:.5ch; align-items:baseline}
  .crumbs .root{color:var(--dim)}
  .crumbs .seg{color:var(--teal)}
  .crumbs .sep{color:#39424f}
  .meta{font-family:var(--mono); font-size:clamp(10px,1.2vw,14px); color:var(--dim); white-space:nowrap}
  .body{display:flex; flex-direction:column; justify-content:center; min-height:0; padding:clamp(24px,5vw,72px) 0}
  .kicker{font-family:var(--mono); font-size:clamp(11px,1.5vw,17px); color:var(--teal); letter-spacing:.08em; text-transform:lowercase; margin-bottom:clamp(10px,1.6vw,20px)}
  h1{font-size:clamp(38px,8.5vw,104px); font-weight:800; line-height:.98; letter-spacing:-.03em}
  .lead{margin-top:.8em; color:var(--mut); font-size:clamp(16px,2.4vw,26px); max-width:30ch; line-height:1.3}
  .talks{margin-top:clamp(22px,4vw,52px); display:flex; flex-direction:column; gap:clamp(10px,1.4vw,16px); max-width:980px}
  .talk{
    display:grid; grid-template-columns:minmax(8ch,12ch) minmax(0,1fr) auto;
    align-items:baseline; gap:clamp(12px,2vw,28px);
    background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--teal);
    border-radius:10px; padding:clamp(12px,1.6vw,18px) clamp(14px,2vw,22px);
    color:var(--ink); text-decoration:none;
  }
  .talk:hover,.talk:focus-visible{border-color:#274b46; border-left-color:var(--amber); outline:none}
  .date{font-family:var(--mono); color:var(--amber); font-size:clamp(11px,1.35vw,15px)}
  .name{font-size:clamp(19px,3.5vw,40px); font-weight:800; line-height:1.08}
  .sub{display:block; margin-top:.35em; color:var(--mut); font-size:clamp(12px,1.45vw,16px); font-family:var(--mono); font-weight:500; line-height:1.35}
  .arr{font-family:var(--mono); color:var(--dim); font-size:clamp(16px,2.2vw,26px)}
  .cue{background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--teal);
       border-radius:10px; padding:clamp(10px,1.5vw,16px) clamp(12px,1.8vw,20px)}
  .cue .lbl{font-family:var(--mono); font-size:clamp(10px,1.15vw,13px); color:var(--teal); letter-spacing:.06em; margin-bottom:.5em}
  .cue p{font-family:var(--mono); font-size:clamp(11px,1.42vw,16px); color:var(--mut); line-height:1.32}
  .progress{position:fixed; top:0; left:0; height:3px; background:var(--teal); width:100%; z-index:6}
  @media (max-width:640px){
    .topbar{align-items:flex-start}
    .talk{grid-template-columns:1fr auto}
    .date{grid-column:1 / -1}
  }
</style>
</head>
<body>
<div class="progress"></div>
<main class="page">
  <div class="topbar">
    <div class="crumbs"><span class="root">~/presentations</span><span class="sep">/</span><span class="seg">index</span></div>
    <div class="meta">01 talk</div>
  </div>

  <section class="body">
    <div class="kicker">// публичные слайды</div>
    <h1>Презентации</h1>
    <p class="lead">Индекс докладов, которые можно открыть прямо в браузере.</p>

    <nav class="talks" aria-label="Список презентаций">
      <a class="talk" href="20260701/">
        <span class="date">2026-07-01</span>
        <span>
          <span class="name">Клининг после вайбкодеров</span>
          <span class="sub">AI Engineers Guild · полевые заметки инженера-клинера</span>
        </span>
        <span class="arr" aria-hidden="true">›</span>
      </a>
    </nav>
  </section>

  <div class="cue">
    <div class="lbl">// index</div>
    <p>Выбери презентацию из списка выше.</p>
  </div>
</main>
</body>
</html>
