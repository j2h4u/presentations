<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Клининг после вайбкодеров</title>
<style>
  :root{
    --bg:#0E1116; --panel:#161B22; --panel2:#1B222C; --line:#232B36;
    --ink:#E6EDF3; --mut:#8B949E; --dim:#5b6675;
    --teal:#2DD4BF; --amber:#F5A623;
    --sans:-apple-system,"Segoe UI",system-ui,Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,"Liberation Mono",monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    overflow:hidden; -webkit-font-smoothing:antialiased;
  }
  #deck{position:fixed; inset:0}
  .slide{
    position:absolute; inset:0; display:none;
    grid-template-rows:auto minmax(0,1fr) auto;
    padding:clamp(20px,4.2vw,64px);
    opacity:0; transition:opacity .28s ease;
  }
  .slide.on{display:grid; opacity:1}
  .slide.title.on{display:flex; flex-direction:column; justify-content:center}
  @media (prefers-reduced-motion:reduce){.slide{transition:none}}

  /* top bar: breadcrumbs + meta */
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:16px; flex:0 0 auto}
  .crumbs{font-family:var(--mono); font-size:clamp(10px,1.35vw,15px); letter-spacing:.02em; color:var(--dim); display:flex; flex-wrap:wrap; gap:.5ch; align-items:baseline}
  .crumbs .root{color:var(--dim)}
  .crumbs .seg{color:var(--dim)}
  .crumbs .seg.cur{color:var(--teal)}
  .crumbs .sep{color:#39424f}
  .meta{font-family:var(--mono); font-size:clamp(10px,1.2vw,14px); color:var(--dim); display:flex; align-items:center; gap:12px; white-space:nowrap}
  .opt{border:1px solid var(--amber); color:var(--amber); border-radius:999px; padding:2px 10px; font-size:clamp(9px,1.1vw,12px); letter-spacing:.06em; text-transform:uppercase}

  /* main body */
  .body{display:flex; flex-direction:column; justify-content:center; min-height:0; overflow:hidden; padding:clamp(6px,1.6vw,22px) 0}
  .kicker{font-family:var(--mono); font-size:clamp(11px,1.5vw,17px); color:var(--teal); letter-spacing:.08em; text-transform:lowercase; margin-bottom:clamp(10px,1.6vw,20px)}
  h1{font-size:clamp(30px,6.6vw,74px); font-weight:800; line-height:1.02; letter-spacing:-.02em}
  h1 .amberword{color:var(--amber)}
  h1 .tealword{color:var(--teal)}

  .lines{margin-top:clamp(16px,2.6vw,34px); display:flex; flex-direction:column; gap:clamp(10px,1.6vw,20px)}
  .lines .l{display:flex; align-items:flex-start; gap:.6em; font-size:clamp(19px,3.5vw,40px); font-weight:700; line-height:1.08}
  .lines .l .dot{flex:0 0 auto; width:.42em; height:.42em; border-radius:50%; margin-top:.5em; background:var(--amber)}
  .slide.method .lines .l .dot{background:var(--teal)}

  .punch{margin-top:clamp(16px,2.6vw,32px); font-size:clamp(24px,4.6vw,52px); font-weight:800; line-height:1.06; color:var(--teal)}
  .punch.amber{color:var(--amber)}

  /* title slide */
  .title-eyebrow{font-family:var(--mono); color:var(--teal); letter-spacing:.16em; font-size:clamp(12px,1.6vw,18px); text-transform:uppercase}
  .title-main{font-size:clamp(38px,8.5vw,104px); font-weight:800; line-height:.98; letter-spacing:-.03em; margin-top:.35em}
  .title-sub{margin-top:.8em; color:var(--mut); font-size:clamp(16px,2.4vw,26px); max-width:24ch; line-height:1.3}
  .title-foot{margin-top:auto; font-family:var(--mono); color:var(--dim); font-size:clamp(11px,1.4vw,15px)}
  .title-foot .h{color:var(--teal); text-decoration:none}
  .title-foot a.h:hover{text-decoration:underline}

  /* AI message bubble (signature) */
  .ai{background:linear-gradient(180deg,#12303020,#0e1116); border:1px solid #274b46; border-left:3px solid var(--teal);
      border-radius:12px; padding:clamp(12px,1.6vw,18px) clamp(14px,2vw,22px); max-width:58ch}
  .ai .h{font-family:var(--mono); font-size:clamp(11px,1.4vw,15px); color:var(--teal); letter-spacing:.04em; margin-bottom:.5em; display:flex; align-items:center; gap:.6ch}
  .ai .h .glyph{color:var(--teal)}
  .ai .msg{font-size:clamp(15px,2.1vw,25px); font-weight:600; line-height:1.2}
  .cursor{display:inline-block; width:.55ch; height:1.05em; background:var(--teal); margin-left:.15ch; transform:translateY(.15em); animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  .qs{margin-top:clamp(12px,1.8vw,22px); display:flex; flex-direction:column; gap:clamp(10px,1.4vw,16px)}
  .q{font-size:clamp(18px,2.9vw,34px); font-weight:800; line-height:1.08}
  .q .n{font-family:var(--mono); color:var(--amber); font-size:.62em; margin-right:.5ch; font-weight:700}
  .q .sub{display:block; margin-top:.25em; font-size:.6em; font-weight:600; color:var(--mut)}

  /* steps map */
  .steps{margin-top:clamp(14px,2vw,26px); display:grid; grid-template-columns:1fr 1fr; gap:clamp(8px,1.3vw,16px) clamp(20px,4vw,60px)}
  .step{display:flex; align-items:baseline; gap:.7ch; font-size:clamp(15px,2.3vw,26px); font-weight:700; line-height:1.15}
  .step .n{font-family:var(--mono); color:var(--teal); font-size:.8em; min-width:1.6ch; text-align:right}
  @media (max-width:640px){.steps{grid-template-columns:1fr}}

  /* clickable links (final slide) */
  .linkrow{margin-top:clamp(16px,2.6vw,32px); display:flex; flex-direction:column; gap:clamp(9px,1.3vw,15px)}
  .linkrow a{font-family:var(--mono); font-size:clamp(15px,2.2vw,26px); font-weight:600; color:var(--teal); text-decoration:none; display:flex; align-items:baseline; gap:.7ch; line-height:1.2}
  .linkrow a:hover{text-decoration:underline}
  .linkrow a .arr{color:var(--dim); font-size:.85em}
  .linkrow a .lbl{color:var(--mut); font-weight:400; font-size:.82em}

  /* cue panel — Max's teleprompter, subordinate */
  .cue{flex:0 0 auto; background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--teal);
       border-radius:10px; padding:clamp(10px,1.5vw,16px) clamp(12px,1.8vw,20px); margin-top:clamp(12px,1.8vw,20px)}
  .cue .lbl{font-family:var(--mono); font-size:clamp(10px,1.15vw,13px); color:var(--teal); letter-spacing:.06em; margin-bottom:.5em}
  .cue ul{list-style:none; display:flex; flex-direction:column; gap:.32em}
  .cue li{font-family:var(--mono); font-size:clamp(11px,1.42vw,16px); color:var(--mut); line-height:1.32; padding-left:1.1ch; text-indent:-1.1ch}
  .cue li::before{content:"› "; color:var(--dim)}
  .cue li b{color:var(--ink); font-weight:600}
  .cue li .tag{color:var(--amber)}

  /* nav */
  .nav{position:fixed; bottom:14px; left:0; right:0; display:flex; align-items:center; justify-content:center; gap:18px; pointer-events:none; z-index:5}
  .nav button{pointer-events:auto; background:var(--panel2); color:var(--mut); border:1px solid var(--line); border-radius:8px;
    width:40px; height:34px; font-size:18px; cursor:pointer; transition:.15s}
  .nav button:hover{color:var(--ink); border-color:var(--teal)}
  .counter{pointer-events:none; font-family:var(--mono); font-size:13px; color:var(--dim); min-width:8ch; text-align:center}
  .progress{position:fixed; top:0; left:0; height:3px; background:var(--teal); width:0; transition:width .28s ease; z-index:6}
  .hint{position:fixed; bottom:16px; right:16px; font-family:var(--mono); font-size:12px; color:var(--dim); z-index:5; transition:opacity .5s; pointer-events:none}
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div id="deck"></div>
<div class="nav">
  <button id="prev" title="Назад (←)">‹</button>
  <span class="counter" id="counter"></span>
  <button id="next" title="Вперёд (→)">›</button>
</div>
<div class="hint" id="hint">← → листать · F — на весь экран</div>

<script>
const SEGMENTS = ["Разогрев","Кто я","Симптомы","Как чиню","Не один","Кейсы","Финал"];

const SLIDES = [
  { variant:"title" },

  { seg:"Разогрев", variant:"ai",
    ai:"Максим, я подготовил для тебя эти вопросы для зала. Пожалуйста, зачитай их и сделай вид, что придумал сам.",
    qs:[
      {n:"1", t:"Кто здесь?", sub:"пишете код · делаете продукт · менеджите · просто интересно?"},
      {n:"2", t:"Кто хоть раз собирал что-то, просто болтая с ИИ?", sub:"сайт, бота, автоматизацию — плюсаните в чат"}
    ],
    cue:["Читаешь <b>прямо со слайда</b> — в этом и шутка.","Ответы — <b>в чат звонка</b>. Дай 5–10 секунд.","Вопрос 1 — твой <b>пульт громкости</b>: больше кодеров → техничнее; больше продактов → проще.","Отвечают вяло — <b>это норм</b>. Сам полушутя ответил и пошёл дальше."] },

  { seg:"Разогрев", variant:"question",
    kicker:"мостик в тему",
    q:"«Вроде работает» и «работает»",
    qsub:"У кого было так: за вечер с ИИ выходит штука, которая вроде работает и прямо вау — а потом оказывается, что это две очень разные вещи?",
    cue:["После ответов → <b>«вот с этим зазором меня и зовут разбираться»</b>.","Это и есть переход к тому, кто ты."] },

  { seg:"Кто я", kicker:"кто говорит",
    title:"Максим Бращенко",
    lines:["Octopus-shaped инженер: бэкенд, продукт, инфра","Сейчас чиню то, что собрали на вайбкодинге"],
    cue:["Путь можно голосом, коротко: 6 лет в одной компании — куча шляп, от саппорта до тимлида и Forward Deploy → сейчас независимый консультант.","Кредибилити без CV: <b>я всю жизнь в той части стека, где всё и ломается</b> — инфра, безопасность, ops.","«Вайбкодинг доводит до „работает у меня“ — дальше начинается инженерия».","Как попал: запросы пришли сами (LinkedIn). Везло на опытных вайбкодеров."] },

  { seg:"Кто я", cls:"method", kicker:"мой AI-стек",
    title:"Чем я работаю",
    lines:["Claude Code CLI","Codex CLI","OpenCode (headless): Deepseek 4 Pro + GLM 5.2","Hermes (ассистент)","<span class='tealword'>В рантаймах — SDD-фреймворк get-shit-done</span>"],
    cue:["Claude Code + Codex — рабочие лошадки; OpenCode с Deepseek/GLM — для ревью.","Hermes — личный ассистент: календари, ops-алерты по крону.","get-shit-done — мой SDD-фреймворк, во всех рантаймах; юзаю ежедневно, контрибьючу."] },

  { seg:"Симптомы", cls:"", kicker:"диагноз всегда один",
    title:"Инфраструктура голая",
    lines:["Всё торчит на 0.0.0.0","Криптомайнер прямо в Postgres-контейнере","Дефолтные пароли — перебор открыт"],
    cue:["Нет fail2ban → червь ~месяц брутфорсил, залил бинарники, молотил на 8 ядрах.","Майнер селится <b>в тот же контейнер</b> — контейнеры дали ложное чувство безопасности."] },

  { seg:"Симптомы", kicker:"диагноз всегда один",
    title:"Тесты, данные, секреты<br>вперемешку",
    lines:["Тесты пишут в прод — до дропа базы","Токены светятся в адресной строке"],
    cue:["Один namespace, no RLS, дефолтные пароли.","Живой случай: <b>фаундеры демонстрировали продукт на записи</b> — токен в адресной строке → стоп-кадр → забрал токен → абьюзишь. До «осядет ли в логах» тут даже не доходит.","Логи нищие: недельный лог = 5 строк. Байка: «хватит ли сервера на второго телеграм-бота?».","Шутка по вкусу: <b>«вайбкод-прототип — это в лучшем случае хорошая документация»</b>."] },

  { seg:"Как чиню", kicker:"как я захожу в проект",
    title:"Привожу в чувство — по шагам",
    steps:["Ставлю агента на VPS","Бэкапы — сразу","Аудит: security · тесты","Чиню тесты","Метрики сложности","Рефакторинг по цифрам","CI/CD: protected master","Deployment previews","Структурированные логи","Hermes в Telegram"],
    cue:["Это твой <b>маршрут</b>. Назови все по именам, разверни 2–3 (бэкапы, тесты, previews).","Порядок важен: сначала обезопасить, потом трогать."] },

  { seg:"Как чиню", kicker:"шаг 1",
    title:"Сначала — бэкапы",
    punch:"«Люди делятся на тех, кто уже делает бэкапы, и тех, кто ещё не»",
    cue:["Бэкапы <b>до всего</b> + сразу проверяю restore.","Честная история: чистил проект, <b>мои же тесты дропнули базу</b> — узнал, когда увидел пустую базу.","Но бэкапы делаю давно — <b>спасли</b>. Потому это смешно, а не трагично.","Отсюда рефлекс: первым делом — изоляция тестов."] },

  { seg:"Как чиню", kicker:"шаги 2–3",
    title:"Тесты — увести с прода",
    lines:["Первый вопрос: насколько тесты изолированы","Есть доступ к проду → убираю немедленно"],
    cue:["Дальше — тестовые среды/фикстуры.","Фиксирую поведение тестами: <b>сначала запираешь — потом трогаешь</b>."] },

  { seg:"Как чиню", cls:"method", kicker:"шаги 4–6",
    title:"Рефакторинг",
    punch:"Промпчу модель как инженер,<br>а не как вайбкодер",
    cue:["Прошу пройтись по DRY/KISS/SOLID — и держу <b>от овер-инжиниринга</b>. Цель — снизить сложность, чтобы не играть в детектива.","<b>Full disclosure залу:</b> идеальную архитектуру не строю — платят за чистку авгиевых конюшен, не за перфекционизм.","Глубокий разбор архитектуры отдаю <b>панели из разных LLM</b> — рулю, а не ныряю. Перфекционизм — way above my pay grade."] },

  { seg:"Как чиню", cls:"method", kicker:"шаг 8 · вау-эффект",
    title:"Каждый PR — на своём поддомене",
    lines:["Копия прода целиком","Тестируют люди и агенты"],
    cue:["Вайбкодеры тестировали <b>только на проде</b> → это сносит крышу.","Заодно выкидываю лишнее: Redis/Celery для простого не нужны — Postgres сам тянет."] },

  { seg:"Как чиню", cls:"method", kicker:"шаг 9 · наблюдаемость",
    title:"Логи и алерты",
    lines:["Сначала — структурированные логи","Алерты — Hermes по крону, не Sentry"],
    cue:["В вайбкоде логи нищие. Делаю JSON, по которому удобно делать запросы — фанат <b>log-driven development</b>.","Hermes раз в час смотрит логи и алертит. Просто, весело, агентно."] },

  { seg:"Не один", optional:true, cls:"method", kicker:"мой стек",
    title:"Я делаю это не один",
    lines:["Ансамбль агентов ревьюит друг друга","Hermes — ops-слой в Telegram"],
    cue:["Код ими не пишу — делаю <b>adversarial-ревью</b>: ревьюит модель <b>другого вендора</b> (самопроверка — театр).","Гардрейлы/хардгейты: детерминированные гейты. Кейс: агент правил файл со скорами, чтобы пройти гейт — оркестратор поймал.","Кивок Артёму: безопасность репо можно проверять автоматически (его open-source скилл)."] },

  { seg:"Кейсы", optional:true, kicker:"по верхам, без глубины",
    title:"Кейсы — коротко",
    punch:"Выглядело рабочим — но цифры не сходились",
    punchAmber:true,
    cue:["Муз. лейбл: один человек собрал ETL → Postgres + Metabase, получил под это финансирование.","Переписал: vanilla Python → SQL + Polars. ~6 минут, точнее людей.","<span class='tag'>Не углубляйся.</span> Подробности — только если спросят в Q&A."] },

  { seg:"Финал", kicker:"итог",
    title:'«Работает у меня» →<br><span class="tealword">инженерия</span>',
    cue:["Закрывающая: «Вайбкодинг доводит до „работает у меня“. Всё дальше — бэкапы, тесты, детерминизм, безопасность, ops — это инженерия. Этот разрыв и есть моя работа».","Поворот к залу: <b>у каждого есть свой такой бардак</b>.","Опц.: «в одном проекте вычистил так, что остался техпартнёром»."] },

  { seg:"Финал", kicker:"давай пообщаемся",
    title:"Вопросы?",
    links:[
      {u:"https://t.me/vlbecode", t:"t.me/vlbecode", lbl:"— канал «Vibecoding is so last year»"},
      {u:"https://www.linkedin.com/in/j2h4u/", t:"linkedin.com/in/j2h4u", lbl:"— LinkedIn"},
      {u:"https://t.me/ai_engineers_guild", t:"t.me/ai_engineers_guild", lbl:"— комьюнити стрима"}
    ],
    cue:["<b>Держать наготове:</b> full disclosure подробно · greenfield/brownfield/blackfield · детали кейса · бэкграунд.","Совет: топовую модель — только оркестратором, имплементит субагентами на Sonnet/Haiku (effort=low) — дешевле и быстрее.","Сигнал доступности <b>из силы</b> (разборчив и востребован). Пусть Артём спросит: «открыт к новым проектам?».","Контакты — на слайде, кликабельны."] },
];

const deck = document.getElementById('deck');

function crumbHTML(curSeg){
  let html = '<span class="root">~/talk</span>';
  SEGMENTS.forEach(s=>{
    html += '<span class="sep">/</span>';
    html += '<span class="seg'+(s===curSeg?' cur':'')+'">'+s+'</span>';
  });
  return html;
}

function render(){
  SLIDES.forEach((s,i)=>{
    const el = document.createElement('section');
    el.className = 'slide' + (s.cls?(' '+s.cls):'');
    el.dataset.i = i;

    if(s.variant==='title'){
      el.className = 'slide title';
      el.innerHTML = `
        <div class="body" style="justify-content:center">
          <div class="title-eyebrow">// AI Engineers Guild</div>
          <div class="title-main">Клининг после<br>вайбкодеров</div>
          <div class="title-sub">Как я захожу в проект, собранный на вайбкодинге, и привожу его в чувство.</div>
          <div class="title-foot">полевые заметки инженера-клинера · <a href="https://www.linkedin.com/in/j2h4u/" target="_blank" rel="noopener" class="h">@j2h4u</a></div>
        </div>`;
      deck.appendChild(el); return;
    }

    const optBadge = s.optional ? '<span class="opt">optional · можно пропустить</span>' : '';
    const top = `<div class="topbar"><div class="crumbs">${crumbHTML(s.seg)}</div><div class="meta">${optBadge}<span>${String(i).padStart(2,'0')} / ${String(SLIDES.length-1).padStart(2,'0')}</span></div></div>`;

    let body = '<div class="body">';
    if(s.kicker) body += `<div class="kicker">// ${s.kicker}</div>`;

    if(s.variant==='ai'){
      body += `<div class="ai"><div class="h"><span class="glyph">◆</span> сообщение от Opus 4.8 → Максиму</div><div class="msg">${s.ai}<span class="cursor"></span></div></div>`;
      body += '<div class="qs">';
      s.qs.forEach(q=> body += `<div class="q"><span class="n">${q.n}</span>${q.t}<span class="sub">${q.sub}</span></div>`);
      body += '</div>';
    } else if(s.variant==='question'){
      body += `<h1>${s.q}</h1>`;
      body += `<div class="qs"><div class="q" style="font-weight:600;font-size:clamp(17px,2.9vw,34px)">${s.qsub}</div></div>`;
    } else {
      if(s.title) body += `<h1>${s.title}</h1>`;
      if(s.punch) body += `<div class="punch${s.punchAmber?' amber':''}">${s.punch}</div>`;
      if(s.lines){ body += '<div class="lines">'; s.lines.forEach(l=> body += `<div class="l"><span class="dot"></span><span>${l}</span></div>`); body += '</div>'; }
      if(s.steps){ body += '<div class="steps">'; s.steps.forEach((st,k)=> body += `<div class="step"><span class="n">${k+1}</span><span>${st}</span></div>`); body += '</div>'; }
      if(s.links){ body += '<div class="linkrow">'; s.links.forEach(l=> body += `<a href="${l.u}" target="_blank" rel="noopener">${l.t} <span class="lbl">${l.lbl}</span> <span class="arr">↗</span></a>`); body += '</div>'; }
    }
    body += '</div>';

    let cue = '';
    if(s.cue){ cue = '<div class="cue"><div class="lbl">// тебе — о чём сказать</div><ul>'; s.cue.forEach(c=> cue += `<li>${c}</li>`); cue += '</ul></div>'; }

    el.innerHTML = top + body + cue;
    deck.appendChild(el);
  });
}

render();

const slides = [...document.querySelectorAll('.slide')];
let cur = 0;
const counter = document.getElementById('counter');
const progress = document.getElementById('progress');

function show(n){
  cur = Math.max(0, Math.min(slides.length-1, n));
  slides.forEach((s,i)=> s.classList.toggle('on', i===cur));
  counter.textContent = (cur) + ' / ' + (slides.length-1);
  progress.style.width = (cur/(slides.length-1)*100) + '%';
  location.hash = cur;
}
function next(){ show(cur+1); }
function prev(){ show(cur-1); }

document.getElementById('next').addEventListener('click', e=>{e.stopPropagation(); next();});
document.getElementById('prev').addEventListener('click', e=>{e.stopPropagation(); prev();});
document.addEventListener('click', e=>{ if(e.target.closest('.nav')||e.target.closest('a')) return; next(); });
document.addEventListener('keydown', e=>{
  if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){ e.preventDefault(); next(); }
  else if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){ e.preventDefault(); prev(); }
  else if(e.key==='Home'){ show(0); }
  else if(e.key==='End'){ show(slides.length-1); }
  else if(e.key==='f'||e.key==='F'){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
});

const start = parseInt(location.hash.replace('#',''))||0;
show(start);
setTimeout(()=>{ const h=document.getElementById('hint'); if(h) h.style.opacity=0; }, 4500);
</script>
